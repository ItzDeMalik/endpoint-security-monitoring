<ossec_config>

  <!-- ==================== CLIENT SETTINGS ==================== -->
  <client>
    <server>
      <address>WAZUH_MANAGER_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows, windows10</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ==================== FILE INTEGRITY MONITORING ==================== -->
  <syscheck>
    <disabled>no</disabled>

    <!-- How often FIM scans run (in seconds) -->
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- Windows critical directories to monitor -->
    <directories check_all="yes" realtime="yes" report_changes="yes">C:\Windows\System32</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">C:\Windows\SysWOW64</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">C:\Program Files</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">C:\Users\Default</directories>

    <!-- Windows registry monitoring -->
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Winlogon</windows_registry>

    <!-- Ignore temp and cache directories to reduce noise -->
    <ignore>C:\Windows\System32\LogFiles</ignore>
    <ignore>C:\Windows\System32\wbem\Logs</ignore>
    <ignore type="sregex">.log$|.tmp$|.temp$</ignore>

    <!-- Max file size to check (in MB) -->
    <max_files_per_second>100</max_files_per_second>
  </syscheck>

  <!-- ==================== LOG COLLECTION ==================== -->
  <localfile>
    <!-- Windows Security Event Log - logins, privilege use, policy changes -->
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID=4624 or EventID=4625 or EventID=4648 or EventID=4672 or EventID=4720 or EventID=4726 or EventID=4728 or EventID=4732]</query>
  </localfile>

  <localfile>
    <!-- Windows System Event Log -->
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <!-- Windows Application Event Log -->
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <!-- Sysmon Logs - process creation, network, file events -->
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <!-- PowerShell Script Block Logging -->
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <!-- Windows Defender Logs -->
    <location>Microsoft-Windows-Windows Defender/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ==================== ACTIVE RESPONSE ==================== -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ==================== VULNERABILITY DETECTION ==================== -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

</ossec_config>
